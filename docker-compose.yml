version: "3.9"

services:
  task_a:
    build:
      context: .
      dockerfile: task_a/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./shared:/app/shared
      - model_cache:/root/.cache
    environment:
      - MODEL_NAME=mistralai/Mistral-7B-Instruct-v0.2
      - PYTHONPATH=/app
    restart: unless-stopped

  task_b:
    build:
      context: .
      dockerfile: task_b/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./shared:/app/shared
      - model_cache:/root/.cache
    environment:
      - MODEL_NAME=mistralai/Mistral-7B-Instruct-v0.2
      - PYTHONPATH=/app
    restart: unless-stopped

volumes:
  model_cache:
