version: "3.9"

services:

  # ── PostgreSQL Database ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hackathon_db
    environment:
      POSTGRES_DB:       hackathon
      POSTGRES_USER:     hackathon
      POSTGRES_PASSWORD: hackathon
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d   # auto-runs on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackathon"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Data ingestion (run once) ─────────────────────────────────
  ingest:
    build:
      context: .
      dockerfile: database/Dockerfile
    container_name: hackathon_ingest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hackathon:hackathon@db:5432/hackathon
      MAX_ROWS: "50000"
    volumes:
      - ./data:/app/data
    profiles: ["ingest"]   # only runs with: docker-compose --profile ingest up ingest

  # ── Task A — User Modeling ────────────────────────────────────
  task_a:
    build:
      context: .
      dockerfile: task_a/Dockerfile
    container_name: hackathon_task_a
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hackathon:hackathon@db:5432/hackathon
      MODEL_NAME:   mistralai/Mistral-7B-Instruct-v0.2
      PYTHONPATH:   /app
    volumes:
      - ./data:/app/data
      - model_cache:/root/.cache
    restart: unless-stopped

  # ── Task B — Recommendation ───────────────────────────────────
  task_b:
    build:
      context: .
      dockerfile: task_b/Dockerfile
    container_name: hackathon_task_b
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hackathon:hackathon@db:5432/hackathon
      MODEL_NAME:   mistralai/Mistral-7B-Instruct-v0.2
      PYTHONPATH:   /app
    volumes:
      - ./data:/app/data
      - model_cache:/root/.cache
    restart: unless-stopped

volumes:
  pg_data:
  model_cache:
